name: Release

on:
  push:
    tags: ["v*"]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Verify tag matches package version
        run: |
          tag="${GITHUB_REF_NAME#v}"
          version="$(grep -oE '__version__ = "[^"]+"' src/cchad/__init__.py | cut -d'"' -f2)"
          echo "tag=$tag version=$version"
          if [ "$tag" != "$version" ]; then
            echo "::error::Tag $GITHUB_REF_NAME does not match package version $version. Bump src/cchad/__init__.py before tagging."
            exit 1
          fi

      - name: Install uv
        uses: astral-sh/setup-uv@v5

      - name: Build distributions
        run: uv build

      - name: Check distributions
        run: uvx twine check dist/*

      - uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/

  publish:
    needs: build
    runs-on: ubuntu-latest
    # Configure a matching "pypi" environment and a Trusted Publisher on PyPI.
    # https://docs.pypi.org/trusted-publishers/
    environment:
      name: pypi
      url: https://pypi.org/p/cchad
    permissions:
      id-token: write  # required for OIDC Trusted Publishing (no stored tokens)
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
